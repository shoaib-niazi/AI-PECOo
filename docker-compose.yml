version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: aipeco-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aipeco-backend
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017/
      - DATABASE_NAME=aipeco_db
      - SECRET_KEY=dev_secret_key_change_in_prod
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    depends_on:
      - mongodb
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aipeco-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

volumes:
  mongodb_data:
